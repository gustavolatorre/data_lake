name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create venv and install dev dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: uv run ruff check src/ tests/ dags/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/ dags/

      - name: Mypy type check
        run: uv run mypy src/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create venv and install dev dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          MINIO_ROOT_USER: test-user
          MINIO_ROOT_PASSWORD: test-password
        run: uv run pytest --cov=src --cov-report=term-missing tests/

  dbt-validate:
    name: dbt Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt_project
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dbt-duckdb (offline parsing only)
        # dbt-dremio is NOT used here: it tries to authenticate to the Dremio
        # warehouse even during `dbt parse`, which we can't have on a CI
        # runner that has no Dremio reachable. dbt-duckdb runs in-memory with
        # zero network calls, so it satisfies the adapter contract while
        # letting us validate the project structure (refs, macros, jinja,
        # schema.yml). The `ci` target in profiles.yml is wired for duckdb.
        # We call .venv/bin/dbt directly to bypass uv's project resolution
        # (the parent pyproject.toml has no dbt deps).
        run: |
          uv venv
          uv pip install "dbt-duckdb>=1.10,<1.11"

      - name: dbt deps
        env:
          DBT_TARGET: ci
        run: .venv/bin/dbt deps --profiles-dir .

      - name: dbt parse
        # `dbt parse` resolves refs/macros/jinja with the adapter loaded.
        # duckdb in-memory satisfies the adapter without any network call.
        # Catches: broken refs, undefined macros, schema.yml errors, jinja
        # syntax errors. Does NOT catch Dremio-specific SQL — that's caught
        # at real `dbt build` time in the Airflow DAG.
        env:
          DBT_TARGET: ci
        run: .venv/bin/dbt parse --profiles-dir .

  security:
    name: Security
    runs-on: ubuntu-latest
    # Don't block the merge on advisories alone — the job still runs and
    # uploads results so we can act on them, but a single high-sev finding
    # in a transitive dep does not stop unrelated work from shipping.
    # Flip this to `false` once the team is ready to gate on it.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dev dependencies + pip-audit
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv pip install "pip-audit>=2.7"

      - name: pip-audit (Python deps)
        # `--strict` makes the step fail on any vulnerability. Combined with
        # `continue-on-error: true` above we get the report without blocking.
        # Use `pip-audit --skip-editable` so the project itself is excluded
        # (we're scanning libraries, not our own code).
        run: uv run pip-audit --strict --skip-editable

      - name: Trivy filesystem scan
        # Scans the repo for vulnerable dependencies + known CVEs in
        # Dockerfiles. `severity: HIGH,CRITICAL` keeps signal-to-noise high.
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: table

      - name: Trivy config scan (Dockerfiles + compose)
        # Misconfigurations only — secrets, root containers, missing healthchecks,
        # etc. Less noisy than vuln scans, so we surface MEDIUM+ here.
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: 1
          format: table
