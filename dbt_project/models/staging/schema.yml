version: 2

models:
  - name: stg_silver_breweries
    description: "Staging model for Silver breweries data. Reads from lakehouse.silver.breweries source."
    columns:
      - name: id
        description: "Unique identifier for the brewery (UUID / String)."
        tests:
          - unique
          - not_null
      - name: name
        description: "Brewery name."
        tests:
          - not_null
      - name: brewery_type
        description: "Type of brewery (canonical list lives in seeds/brewery_type_mapping.csv)."
        tests:
          - not_null
          # Single source of truth for valid brewery types: the seed. Using
          # `relationships` against the seed (instead of an inline `accepted_values`)
          # eliminates the duplication that previously let staging drift out of
          # sync with the seed (e.g. the seed had `bar` but the inline list did
          # not, causing test failures on real API data).
          - relationships:
              arguments:
                to: ref('brewery_type_mapping')
                field: brewery_type
              config:
                severity: error
      - name: address_1
        description: "Primary street address."
      - name: city
        description: "City name."
        tests:
          - not_null
      - name: state
        description: "Cleaned and normalized state name (diacritics removed, sentinel values applied)."
        tests:
          - not_null
      - name: country
        description: "Country name."
        tests:
          - not_null
      - name: is_active
        description: "Soft delete flag. TRUE if active, FALSE if deleted from the source."
        tests:
          - not_null
      - name: updated_at
        description: "Timestamp of last modification in the Silver layer."
      - name: ingestion_date
        description: "Staging ingestion partition date (YYYY-MM-DD)."
