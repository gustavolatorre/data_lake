version: 2

models:
  - name: dim_locations
    description: "Dimension table for brewery locations. Deduplicated at country, state, and city level."
    columns:
      - name: location_key
        description: "Surrogate Key generated by MD5 hashing of UPPER(TRIM(country)) | UPPER(TRIM(state)) | UPPER(TRIM(city))."
        tests:
          - unique
          - not_null
      - name: city
        description: "City name."
        tests:
          - not_null
      - name: state
        description: "State or province name (normalized, no accents)."
        tests:
          - not_null
      - name: country
        description: "Country name."
        tests:
          - not_null

  - name: dim_brewery_types
    description: "Dimension table for brewery types."
    columns:
      - name: brewery_type_key
        description: "Surrogate Key generated by MD5 hashing of UPPER(TRIM(brewery_type))."
        tests:
          - unique
          - not_null
      - name: brewery_type
        description: "Brewery type name (ex: micro, nano, regional, brewpub, planning, etc.)."
        tests:
          - not_null
          - relationships:
              to: ref('brewery_type_mapping')
              field: brewery_type

  - name: fact_breweries
    description: "Central Fact table for breweries. Materialized incrementally with merge strategy."
    columns:
      - name: brewery_key
        description: "Surrogate Key of the fact table, MD5 of the business ID."
        tests:
          - unique
          - not_null
      - name: location_key
        description: "Foreign key linking to dim_locations."
        tests:
          - not_null
          - relationships:
              to: ref('dim_locations')
              field: location_key
      - name: brewery_type_key
        description: "Foreign key linking to dim_brewery_types."
        tests:
          - not_null
          - relationships:
              to: ref('dim_brewery_types')
              field: brewery_type_key
      - name: id_business
        description: "Original business identifier from the source API."
      - name: name
        description: "Brewery name."
      - name: address_1
        description: "Primary street address."
      - name: is_active
        description: "Flag indicating if the record is currently active (Soft Delete support)."
      - name: quantity
        description: "Default metric value (always 1) for easy SUM aggregations."
      - name: updated_at
        description: "Timestamp when the record was last processed."

  - name: mart_brewery_coverage
    description: "Aggregated analytics mart providing brewery density and rankings by state and city."
    columns:
      - name: country
        description: "Country name."
      - name: state
        description: "State name."
      - name: city
        description: "City name."
      - name: active_breweries_count
        description: "Number of active breweries currently operating in the city."
      - name: inactive_breweries_count
        description: "Number of inactive/closed breweries historically recorded."
      - name: total_breweries
        description: "Total number of breweries historically registered (active + inactive)."
      - name: active_ratio
        description: "Percentage of active breweries compared to the total (active / total * 100)."
      - name: city_state_rank
        description: "Rank of the city within its state based on the count of active breweries (dense rank)."
