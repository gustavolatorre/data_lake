# ──────────────────────────────────────────────────────
# Reusable service definitions
# ──────────────────────────────────────────────────────

x-spark-common: &spark-common
  build:
    context: .
    dockerfile: docker/Dockerfile.spark
  volumes:
    - ./src:/opt/spark/src
    - ./jobs:/opt/spark/jobs
  env_file:
    - .env
  networks:
    - lakehouse

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  env_file:
    - airflow.env
    - .env
  volumes:
    - ./src:/opt/airflow/src
    - ./dags:/opt/airflow/dags
    - ./jobs:/opt/airflow/jobs
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - lakehouse

# ──────────────────────────────────────────────────────
# Services
# ──────────────────────────────────────────────────────

services:

  # ── Spark ──────────────────────────────────────────
  spark-master:
    <<: *spark-common
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "9090:8080"   # Spark UI
      - "7077:7077"   # Spark master port
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  spark-worker:
    <<: *spark-common
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
      SPARK_MASTER_URL: spark://spark-master:7077

  # ── Nessie (Iceberg REST Catalog) ─────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:0.79.0
    container_name: nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── PostgreSQL (Airflow metadata) ─────────────────
  postgres:
    image: postgres:14.0
    environment:
      POSTGRES_USER: ${AIRFLOW_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD}
      POSTGRES_DB: airflow
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Airflow ───────────────────────────────────────
  scheduler:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username $${AIRFLOW_USER} --firstname Admin --lastname User --role Admin --email $${AIRFLOW_EMAIL} --password $${AIRFLOW_PASSWORD} || true && airflow scheduler"
    depends_on:
      postgres:
        condition: service_healthy
      nessie:
        condition: service_healthy

  webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"   # Airflow UI
    depends_on:
      - scheduler
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── MinIO (S3-compatible storage) ─────────────────
  minio:
    image: minio/minio
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: minio
    ports:
      - "9001:9001"   # MinIO Console
      - "9000:9000"   # MinIO API
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    networks:
      - lakehouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c '
        echo "Waiting for MinIO...";
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2;
        done;
        echo "Creating buckets...";
        mc mb --ignore-existing local/bronze &&
        mc mb --ignore-existing local/silver &&
        mc mb --ignore-existing local/gold &&
        mc mb --ignore-existing local/warehouse &&
        echo "Buckets created successfully." &&
        exit 0;
      '
    env_file:
      - .env
    networks:
      - lakehouse

# ──────────────────────────────────────────────────────
# Infrastructure
# ──────────────────────────────────────────────────────

volumes:
  minio-data:

networks:
  lakehouse:
    driver: bridge
