# ──────────────────────────────────────────────────────
# Reusable service definitions
# ──────────────────────────────────────────────────────

x-spark-common: &spark-common
  image: data_lake-spark:latest
  pull_policy: never
  volumes:
    - ./src:/opt/spark/src
    - ./jobs:/opt/spark/jobs
  env_file:
    - .env
  networks:
    - lakehouse

x-airflow-common: &airflow-common
  image: data_lake-airflow:latest
  pull_policy: never
  env_file:
    - airflow.env
    - .env
  environment:
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin,${AIRFLOW_USER}:admin
  volumes:
    - ./src:/opt/airflow/src
    - ./dags:/opt/airflow/dags
    - ./jobs:/opt/airflow/jobs
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./dbt_project:/opt/airflow/dbt_project
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - lakehouse

# ──────────────────────────────────────────────────────
# Services
# ──────────────────────────────────────────────────────

services:

  # ── Spark ──────────────────────────────────────────
  spark-master:
    <<: *spark-common
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "9090:8080" # Spark UI
      - "7077:7077" # Spark master port
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  spark-worker:
    <<: *spark-common
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
      SPARK_MASTER_URL: spark://spark-master:7077

  # ── Nessie (Iceberg REST Catalog) ─────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:0.107.5
    container_name: nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120
    networks:
      - lakehouse
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:19120/api/v2/config" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── PostgreSQL (Airflow metadata) ─────────────────
  postgres:
    image: postgres:14.0
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    networks:
      - lakehouse
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Airflow ───────────────────────────────────────
  scheduler:
    <<: *airflow-common
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    command: bash -c "python -c \"import os, json; print(json.dumps(dict([(os.getenv('AIRFLOW_USER','admin'),os.getenv('AIRFLOW_PASSWORD','airflow'))])))\" > /opt/airflow/simple_auth_passwords.json && airflow db migrate && airflow scheduler"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      nessie:
        condition: service_healthy

  dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      nessie:
        condition: service_healthy

  webserver:
    <<: *airflow-common
    command: bash -c "python -c \"import os, json; print(json.dumps(dict([(os.getenv('AIRFLOW_USER','admin'),os.getenv('AIRFLOW_PASSWORD','airflow'))])))\" > /opt/airflow/simple_auth_passwords.json && airflow api-server"
    restart: always
    ports:
      - "8080:8080" # Airflow UI
    depends_on:
      - scheduler
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── MinIO (S3-compatible storage) ─────────────────
  minio:
    image: minio/minio
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: minio
    ports:
      - "9001:9001" # MinIO Console
      - "9000:9000" # MinIO API
    command: [ "server", "/data", "--console-address", ":9001" ]
    volumes:
      - minio-data:/data
    networks:
      - lakehouse
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c '
        echo "Waiting for MinIO...";
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2;
        done;
        echo "Creating buckets...";
        mc mb --ignore-existing local/staging &&
        mc mb --ignore-existing local/warehouse &&
        echo "Buckets created successfully." &&
        exit 0;
      '
    env_file:
      - .env
    networks:
      - lakehouse

  # ── Dremio (Query Engine) ─────────────────────────
  dremio:
    image: dremio/dremio-oss:latest
    container_name: dremio
    ports:
      - "9047:9047" # Dremio UI
      - "31010:31010" # Dremio JDBC
    environment:
      - DREMIO_JAVA_EXTRA_OPTS=-Xss4M
    volumes:
      - dremio-data:/opt/dremio/data
    networks:
      - lakehouse
    depends_on:
      nessie:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9047/apiv2/server_status" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Dremio Source Provisioner ─────────────────────
  dremio-setup:
    image: curlimages/curl:latest
    container_name: dremio-setup
    restart: on-failure
    env_file:
      - .env
    environment:
      - DREMIO_ADMIN_USER=${DREMIO_ADMIN_USER}
      - DREMIO_ADMIN_PASSWORD=${DREMIO_ADMIN_PASSWORD}
    volumes:
      - ./docker/dremio/setup_sources.sh:/setup_sources.sh
    entrypoint: [ "/bin/sh", "/setup_sources.sh" ]
    networks:
      - lakehouse
    depends_on:
      dremio:
        condition: service_healthy

# ──────────────────────────────────────────────────────
# Infrastructure
# ──────────────────────────────────────────────────────

volumes:
  minio-data:
  dremio-data:
  nessie-data:
  airflow-db-data:

networks:
  lakehouse:
    driver: bridge
